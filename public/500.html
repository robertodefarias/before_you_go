<!doctype html>

<html lang="pt-BR">

  <head>

    <title>Algo deu errado (500)</title>

    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">

    <style>

      *, *::before, *::after {
        box-sizing: border-box;
      }

      * {
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #0f172a;
        color: #e2e8f0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Roboto, "Segoe UI", Arial, sans-serif;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }

      .container {
        max-width: 480px;
      }

      .icon {
        font-size: 5rem;
        margin-bottom: 1rem;
      }

      h1 {
        font-size: 6rem;
        font-weight: 800;
        color: #ef4444;
        line-height: 1;
        margin-bottom: 0.5rem;
      }

      h2 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #f1f5f9;
        margin-bottom: 1rem;
      }

      p {
        font-size: 1rem;
        color: #94a3b8;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      a.btn {
        display: inline-block;
        background-color: #ef4444;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
        padding: 0.75rem 1.75rem;
        border-radius: 8px;
        font-size: 1rem;
        transition: background-color 0.2s;
      }

      a.btn:hover {
        background-color: #dc2626;
      }

    </style>

  </head>

  <body>

    <div class="container">
      <div class="icon">🔧</div>
      <h1>500</h1>
      <h2>Algo deu errado por aqui.</h2>
      <p>Estamos trabalhando para resolver isso o mais rápido possível.<br>
         Por favor, tente novamente em alguns instantes.</p>
      <a class="btn" href="/">Voltar ao início</a>
    </div>

  </body>

</html>
